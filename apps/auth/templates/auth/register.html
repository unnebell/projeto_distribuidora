<title>Fahan - Register</title>
<meta name="viewport" content="width=device-width, initial-scale=1" /> <!--Precisa ter a meta para responsividade funcionar-->

{% load static %}
<link rel="icon" href="{% static 'img/flavicon.jpeg' %}" />
<link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}"/>
<link rel="stylesheet" href="{% static 'css/global.css' %}" />
<link rel="stylesheet" href="{% static 'auth/css/register.css' %}" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<body class="bg-animado">
<!-- ================================ Página Registro ================================   -->

<div class="container-fluid d-flex justify-content-center align-items-center vh-100">
    <div class="box-auth row g-0 shadow">
        <div class="img-register col-12 col-sm-6 col-lg-7">
            <img src="{% static 'img/img-painel-login-registro.webp' %}" alt="imagem inicio">
        </div>

        <!-- Formulário para cadastrar -->
        <form id="formRegister" action="{% url 'register' %}" method="POST" class="col-12 col-sm-6 col-lg-5 p-4">{% csrf_token %}
            <div class="mb-1">
                <h1>Registre-se</h1>
                <label class="form-label mb-1 mt-2">Usuário</label>
                <input type="text" class="form-control {% if erros.username %}is-invalid{% endif %}" 
                    name="username" id="username" 
                    placeholder="{% if erros.username %}{{ erros.username }}{% else %}Digite seu usuário{% endif %}" autocomplete="off">
            </div>
            <div class="mb-1">
                <label class="form-label mb-1 mt-2">Email</label>
                <input type="email" class="form-control {% if erros.email %}is-invalid{% endif %}" 
                    name="email" id="email" 
                    placeholder="{% if erros.email %}{{ erros.email }}{% else %}Digite seu email{% endif %}" autocomplete="off">
            </div>
            <div class="mb-1">
                <label class="form-label mb-1 mt-2">Senha</label>
                <div class="position-relative">
                    <input type="password" class="form-control pe-5" name="senha" id="senha" placeholder="Digite sua senha" autocomplete="off">
                    <i class="bi bi-eye toggle-senha" id="toggleSenha"></i>
                </div>
            </div>  
            <p class="text-center mb-4 mt-4">Já possui uma conta? <a href="{% url 'login' %}">Faça login</a></p>
            <button type="submit" class="btn btn-primary d-grid gap-2 col-8 mx-auto">Registrar</button>
        </form>
    </div>
</div>

{% if register_success %}
<div class="toast-container position-fixed top-0 start-50 translate-middle-x p-3">
    <div class="toast align-items-center text-bg-success border-0 show" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-semibold">
                <i class="bi bi-check-circle-fill me-2"></i>Cadastrado com sucesso, {{ username }}! Redirecionando...
            </div>
        </div>
    </div>
</div>

<script>
    setTimeout(function () {
        window.location.href = "{% url redirect_url %}";
    }, 3000);
</script>
{% endif %}

<script src="{% static 'auth/js/register.js' %}"></script>
<!-- <a href="{% url 'index' %}" class="btn-voltar shadow">&#8592; Voltar</a> -->
</body>
