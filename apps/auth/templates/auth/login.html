<title>Fahan - Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

{% load static %}
<link rel="icon" href="{% static 'img/flavicon.jpeg' %}" />
<link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}"/>
<link rel="stylesheet" href="{% static 'css/global.css' %}" />
<link rel="stylesheet" href="{% static 'auth/css/login.css' %}" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<!-- ================================ Página Login ================================   -->
<div class="container-fluid d-flex justify-content-center align-items-center vh-100">
    <div class="box-auth row g-0 shadow">

        <!-- Formulário -->
        <form id="formLogin" action="{% url 'login' %}" method="POST" class="col-12 col-sm-6 col-lg-5 p-4">{% csrf_token %}
            <div class="mb-2">
                <h1>Login</h1>
                <label class="form-label mb-1 mt-2" for="email">E-mail</label>
                <input type="email" class="form-control" name="email" id="email" placeholder="Digite seu e-mail" autocomplete="off" required>
            </div>
            <label class="form-label mb-1 mt-2" for="senha">Senha</label>
            <div class="position-relative">
                <input type="password" class="form-control pe-5" name="senha" id="senha" placeholder="Digite sua senha" autocomplete="off">
                <span class="bi bi-eye toggle-senha" onclick="toggleSenha('senha', this)"></span>
            </div>
            <p class="text-center mb-4 mt-4">Não tem uma conta? <a href="{% url 'register' %}">Registre-se</a></p>
            {% if erro %}
                <div class="alert alert-danger py-1 text-center">{{ erro }}</div>
            {% endif %}
            <button type="submit" class="btn btn-primary d-grid gap-2 col-8 mx-auto mt-5">Entrar</button>
        </form>
        <div class="img-login col-12 col-sm-6 col-lg-7">
            <img src="{% static 'img/img-login.jpg' %}" alt="imagem inicio">
        </div>
    </div>
</div>

{% if login_success %}
<div class="toast-container position-fixed top-0 start-50 translate-middle-x p-3">
    <div class="toast align-items-center text-bg-success border-0 show" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-semibold">
                <i class="bi bi-check-circle-fill me-2"></i>Bem-vindo, {{ username }}! Redirecionando...
            </div>
        </div>
    </div>
</div>

<script>
    setTimeout(function () {
        window.location.href = "{% url redirect_url %}";
    }, 2000);
</script>
{% endif %}

<script src="{% static 'auth/js/login.js' %}"></script>
