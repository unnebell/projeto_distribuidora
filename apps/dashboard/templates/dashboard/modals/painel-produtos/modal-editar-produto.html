<div class="modal fade modal-popup" id="modalEditarProduto" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Editando: <strong><span id="editarProdutoNome"></span></strong></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="editar-form-erros" class="alert alert-danger d-none"></div>
        <form id="form-editar-produto">
          {% csrf_token %}
          <input type="hidden" id="editarProdutoId" name="id">
          <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" id="editarInputNome" name="nome" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Descrição</label>
            <textarea id="editarInputDescricao" name="descricao" class="form-control" rows="3" required></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Preço</label>
            <input type="text" id="editarInputPreco" name="preco" class="form-control" placeholder="0,00" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Quantidade</label>
            <input type="number" id="editarInputQtd" name="quantidade" class="form-control" min="0" required>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-acao" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-acao" id="btn-salvar-edicao">Salvar</button>
      </div>
    </div>
  </div>
</div>

<script>
  const urlEditarProduto = "{% url 'editar_produto' id=0 %}";
</script>
