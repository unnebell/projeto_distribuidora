<div class="modal fade modal-popup" id="modalExcluirStaff" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Atenção!</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="form-erros-excluir" class="alert alert-danger d-none"></div>
        <form id="form-produto">
          {% csrf_token %}
          <div class="mb-3">
            <p><strong>Esta ação não pode ser desfeita!</strong> Você também pode apenas desativar o staff para ocultá-lo.</p>
            <p> <strong>Staff: </strong>[ <span id="id-staff-modal"></span> ] - <span id="nome-staff-modal"></span></p>
          </div>
          <div class="text-center">
            <button type="button" class="btn btn-acao m-3 mb-0" id="btn-desativar">Desativar</button>
            <button type="button" class="btn btn-danger m-3 mb-0" id="btn-excluir">Excluir</button>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>

<script>
  const urlAtivarStaff = "{% url 'ativar_staff' id=0 %}";
  const urlExcluirStaff = "{% url 'excluir_staff' id=0 %}";
  const urlDesativarStaff = "{% url 'desativar_staff' id=0 %}";
</script>
