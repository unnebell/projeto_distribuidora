<div class="modal fade modal-poupup" id="modalExcluirProduto" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Atenção!</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="form-erros-excluir" class="alert alert-danger d-none"></div>
        <form id="form-produto">
          {% csrf_token %}
          <div class="mb-3">
            <p><strong>Esta ação não pode ser desfeita!</strong> Você também pode apenas desativar o produto para ocultá-lo.</p>
            <p> <strong>Produto: </strong>[ <span id="id-produto-modal"></span> ] - <span id="nome-produto-modal"></span></p>
          </div>
          <div class="text-center">
            <button type="button" class="btn btn-acao m-3 mb-0" id="btn-desativar">Desativar</button>
            <button type="button" class="btn btn-danger m-3 mb-0" id="btn-excluir">Excluir</button>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>

<script>
  const urlAtivarProduto = "{% url 'ativar_produto' id=0 %}";
  const urlExcluirProduto = "{% url 'excluir_produto' id=0 %}";
  const urlDesativarProduto = "{% url 'desativar_produto' id=0 %}";
</script>
