<div class="modal fade modal-popup" id="modalAdicionarCliente" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Novo Cliente</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div id="form-erros" class="alert alert-danger d-none"></div>
        <form id="form-cliente">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" name="nome" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required autocomplete="off">
          </div>
          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" name="senha" class="form-control" required autocomplete="off">
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-acao" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-acao" id="btn-salvar">Salvar</button>
      </div>

    </div>
  </div>
</div>

<script>
  const urlAdicionarCliente = "{% url 'adicionar_cliente' %}";
</script>
