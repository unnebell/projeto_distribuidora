{% extends "app_distribuidora/base.html" %}
{% load static %}


{% block nav_links %}
{% endblock nav_links %}

{% block content %}
<link rel="stylesheet" href="{% static 'app_distribuidora/css/bootstrap.min.css' %}"/>
<link rel="stylesheet" href="{% static 'app_distribuidora/css/global.css' %}" />
<link rel="stylesheet" href="{% static 'app_distribuidora/css/admin_custom/admin-area.css' %}" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <section>
        <h1 class="text-center">Painel ADMIN</h1>

        <div class="container mt-4">
            <div class="row g-4 justify-content-center">
                <div class="col-12 col-lg-4">
                    <div class="box-alteracao shadow p-4">
                        <form method="POST">{% csrf_token %}
                            <h2 class="mb-3 text-center">Alterações</h2>
                            <div class="mb-2">
                                <input type="text" class="form-control" autocomplete="off" placeholder="nome">
                            </div>
                            <div class="mb-2">
                                <input type="text" class="form-control" autocomplete="off" placeholder="quantidade">
                            </div>
                            <div class="mb-2">
                                <input type="text" class="form-control" autocomplete="off" placeholder="descrição">
                            </div>
                            <button type="submit" class="btn btn-primary mt-3 d-block mx-auto">Alterar</button>
                        </form>
                    </div>
                </div>

                <div class="col-12 col-lg-7">
                    <div class="box-alteracao shadow p-3">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nome</th>
                                    <th>Qtd</th>
                                    <th>Descrição</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <th>1</th>
                                    <td>Notebook</td>
                                    <td>3</td>
                                    <td>Ideapad 3I</td>
                                    <td>
                                        <button class="btn btn-sm btn-info"><i class="bi bi-eye" ></i></button>
                                        <button class="btn btn-sm btn-warning"><i class="bi bi-pencil"></i></button>
                                        <button class="btn btn-sm btn-danger"><i class="bi bi-trash"></i></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </section>
{% endblock content %}

{% block footer %}
{% endblock footer %}
